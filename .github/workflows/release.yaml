name: release

on:
  push:
    tags:
      - "rpaframework-*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse tag
        id: parse
        run: |
          TAG="${{ github.ref_name }}"
          VERSION=$(echo "$TAG" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+$')
          PACKAGE=$(echo "$TAG" | sed "s/-${VERSION}$//")
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "package=$PACKAGE" >> $GITHUB_OUTPUT
          echo "Tag: $TAG | Package: $PACKAGE | Version: $VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.parse.outputs.tag }}" \
            --title "${{ steps.parse.outputs.package }} ${{ steps.parse.outputs.version }}" \
            --generate-notes \
            --verify-tag
