name: rpaframework

on:
  push:
    branches:
      - master
    paths:
      - "packages/main/**"
      - ".github/workflows/main.yaml"
      - "invocations/requirements.txt"
  pull_request:
    branches:
      - master
    paths:
      - "packages/main/**"
      - ".github/workflows/main.yaml"

defaults:
  run:
    working-directory: "./packages/main"

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        name: [
            "windows-py39",
            "windows-py310",
            "windows-py311",
            "ubuntu-py39",
            "ubuntu-py310",
            "ubuntu-py311",
            "macos-py39",
            "macos-py310",
            "macos-py311",
        ]

        include:
          - name: "windows-py39"
            python: "3.9"
            os: windows-latest
          - name: "windows-py310"
            python: "3.10"
            os: windows-latest
          - name: "windows-py311"
            python: "3.11"
            os: windows-latest
          - name: "ubuntu-py39"
            python: "3.9"
            os: ubuntu-latest
          - name: "ubuntu-py310"
            python: "3.10"
            os: ubuntu-latest
          - name: "ubuntu-py311"
            python: "3.11"
            os: ubuntu-latest
          - name: "macos-py39"
            python: "3.9"
            os: macos-latest
          - name: "macos-py310"
            python: "3.10"
            os: macos-latest
          - name: "macos-py311"
            python: "3.11"
            os: macos-latest

    env:
      SETUPTOOLS_USE_DISTUTILS: stdlib
      INVOKE_IS_CI_CD: 1
      HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
      SYSTEM_VERSION_COMPAT: "0"
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install xclip on linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          DEBIAN_FRONTEND=noninteractive sudo apt-get update -y
          DEBIAN_FRONTEND=noninteractive sudo apt-get install xclip -y
      - name: Upgrade pip
        run: python -m pip install --upgrade pip wheel setuptools
      - name: Install uv
        run: pip install uv
      - name: Install invocation prerequisites
        run: pip install -Ur ../../invocations/requirements.txt
      - name: Get python version
        id: full-python-version
        shell: bash
        run: |
          echo ::set-output name=version::$(python -c "import sys; print('-'.join(str(v) for v in sys.version_info[:3]))")
      - name: Set up cache
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.full-python-version.outputs.version }}-${{ hashFiles('uv.lock') }}
      - name: Install invocation package
        run: invoke install-invocations || invoke self.install-invocations
      - name: Install dependencies
        run: invoke install
      - name: Lint
        run: invoke code.lint -e
      - name: Test (non-linux)
        if: matrix.os != 'ubuntu-latest'
        run: invoke code.test -a
      - name: Test (linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          export XDG_SESSION_TYPE=x11
          xvfb-run --server-args="-screen 0 1280x720x24" invoke code.test
      - uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: ${{ matrix.os }}-py${{ matrix.python }}-test-reports
          path: packages/main/tests/results

  build-wheel:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        run: pip install uv
        working-directory: "."
      - name: Build wheel
        run: uv build --wheel
        working-directory: packages/main
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpaframework-wheel
          path: packages/main/dist/*.whl
          retention-days: 14
      - name: Comment on PR with artifact link
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const marker = '<!-- rpaframework-wheel-artifact -->';
            const body = [
              marker,
              '## Wheel artifact',
              '',
              `Built from commit \`${sha}\` — download from the [workflow run](${runUrl}) (Artifacts section at the bottom of the page).`,
              '',
              'Artifact name: `rpaframework-wheel` (retained 14 days)',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body,
              });
            }

